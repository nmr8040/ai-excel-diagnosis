services:
  - type: web
    name: ai-excel-diagnosis
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: AI_PROVIDER
        value: dummy
      - key: DATABASE_URL
        value: sqlite:////tmp/excel_diagnosis.db
      - key: UPLOAD_DIR
        value: /tmp/uploads
