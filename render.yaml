services:
  - type: web
    name: ai-excel-diagnosis
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: AI_PROVIDER
        value: dummy
      - key: DATABASE_URL
        value: sqlite:////tmp/excel_diagnosis.db
      - key: UPLOAD_DIR
        value: /tmp/uploads
